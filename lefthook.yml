# Lefthook - Git hooks manager
# Replaces Husky + lint-staged.
# Docs: https://lefthook.dev/configuration/

# ─── pre-commit ──────────────────────────────────────────────
# Runs in sequence: per-file linting and formatting.
pre-commit:
  parallel: false
  commands:
    # 1. TypeScript files - ESLint fix + Prettier format
    lint-ts:
      glob: '**/*.ts'
      run: pnpm exec eslint --fix {staged_files} && pnpm exec prettier --write {staged_files}
      stage_fixed: true

    # 2. Markdown files - markdownlint fix + Prettier format
    lint-md:
      glob: '**/*.md'
      run: pnpm exec markdownlint --fix {staged_files} && pnpm exec prettier --write {staged_files}
      stage_fixed: true

    # 3. JSON / YAML - Prettier format only
    lint-json-yml:
      glob: '**/*.{json,yml,yaml}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    # 4. GitHub Actions - Security linting (zizmor)
    lint-actions:
      glob: '.github/workflows/*.yml'
      run: if command -v zizmor > /dev/null; then zizmor {staged_files}; else echo "zizmor not found, skipping actions lint."; fi

# ─── commit-msg ──────────────────────────────────────────────
# Enforces Conventional Commits format via git-hygiene.
commit-msg:
  commands:
    git-hygiene:
      run: npx git-hygiene commit {1}

# ─── pre-push ────────────────────────────────────────────────
# Ensures branch naming and basic validation.
pre-push:
  parallel: true
  commands:
    # Ensure branch naming follows standards
    branch-name:
      run: npx git-hygiene branch

    # Final validation check
    validate:
      run: pnpm run validate
